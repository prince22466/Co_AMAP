apiVersion: batch/v1
kind: CronJob
metadata:
  name: trend-worker-daily
  namespace: trend-platform
spec:
  schedule: "0 2 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: worker
              image: REGION-docker.pkg.dev/PROJECT/REPO/trend-worker:latest
